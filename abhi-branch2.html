<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun HTML</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      max-width: 600px;
      width: 90%;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 3rem;
      letter-spacing: 1px;
    }
    p {
      line-height: 1.6;
      margin: 0 0 30px;
      font-size: 1.1rem;
    }
    .button {
      display: inline-block;
      background: #ff6f61;
      color: #fff;
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-weight: bold;
    }
    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }
    .sparkles {
      display: inline-block;
      font-size: 1.6rem;
      animation: sparkle 1.5s infinite alternate;
    }
    @keyframes sparkle {
      from { opacity: 0.7; transform: scale(1); }
      to { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sparkles">✨</div>
    <h1>Fun HTML Time!</h1>
    <p>Welcome to your playful page. This little HTML file is full of bright colors, smooth shadows, and simple animation to make your browser smile.</p>
    <a class="button" href="#">Click for fun</a>
  </div>
</body>
</html>
