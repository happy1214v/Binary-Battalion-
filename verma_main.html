<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Hub</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:linear-gradient(135deg,#141e30,#243b55);
        color:white;
    }

    header{
        text-align:center;
        padding:40px 20px;
    }

    header h1{
        font-size:3rem;
        margin-bottom:10px;
    }

    header p{
        color:#ddd;
    }

    .music-container{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
        padding:30px;
    }

    .card{
        background:rgba(255,255,255,0.1);
        border-radius:15px;
        overflow:hidden;
        transition:0.3s;
        backdrop-filter:blur(8px);
    }

    .card:hover{
        transform:translateY(-8px);
    }

    .card img{
        width:100%;
        height:250px;
        object-fit:cover;
    }

    .card-content{
        padding:15px;
    }

    .card h3{
        margin-bottom:8px;
    }

    .play-btn{
        display:inline-block;
        margin-top:10px;
        padding:10px 18px;
        background:#1db954;
        color:white;
        text-decoration:none;
        border-radius:30px;
    }

    footer{
        text-align:center;
        padding:20px;
        color:#bbb;
    }
</style>
</head>
<body>

<header>
    <h1>🎵 Music Hub</h1>
    <p>Discover your favorite songs and artists</p>
</header>

<section class="music-container">

    <div class="card">
        <img src="https://picsum.photos/400/300?music1" alt="Album">
        <div class="card-content">
            <h3>Summer Beats</h3>
            <p>Feel the rhythm of summer.</p>
            <a href="#" class="play-btn">▶ Play</a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?music2" alt="Album">
        <div class="card-content">
            <h3>Night Vibes</h3>
            <p>Relax with chill melodies.</p>
            <a href="#" class="play-btn">▶ Play</a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?music3" alt="Album">
        <div class="card-content">
            <h3>Rock Legends</h3>
            <p>Classic rock hits all day.</p>
            <a href="#" class="play-btn">▶ Play</a>
        </div>
    </div>

</section>

<footer>
    © 2026 Music Hub. All Rights Reserved.
</footer>

</body>
</html>
